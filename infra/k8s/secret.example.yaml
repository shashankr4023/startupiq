# DO NOT put real secrets in a committed file. This is only a reference for what
# keys the Secret holds. Create the real one straight from your backend/.env:
#
#   kubectl create secret generic startupiq-secrets \
#       --from-env-file=backend/.env -n startupiq
#
# That command reads every KEY=VALUE line in backend/.env and stores it as a
# Secret. The Deployments load it with `envFrom: secretRef`, so the pods get the
# same config the local app uses (Supabase, OpenAI/Claude keys, models, etc.).
#
# Shape (values shown as placeholders):
apiVersion: v1
kind: Secret
metadata:
  name: startupiq-secrets
  namespace: startupiq
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://...pooler.supabase.com:6543/postgres"
  DATABASE_URL_DIRECT: "postgresql+asyncpg://...pooler.supabase.com:5432/postgres"
  SUPABASE_URL: "https://your-project.supabase.co"
  SUPABASE_ANON_KEY: "..."
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."
  LLM_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4o-mini"
  CLAUDE_MODEL: "claude-sonnet-4-6"
  RATE_LIMIT_EVALUATION: "60/hour"
  RATE_LIMIT_WRITE: "60/minute"
  CACHE_TTL_IDEA: "60"
  CACHE_TTL_DASHBOARD: "60"
