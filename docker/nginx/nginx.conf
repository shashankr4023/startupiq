# nginx as the single front door. Everything enters on port 80:
#   /api/...  -> the FastAPI backend (path preserved, so /api/v1/... still works)
#   /...      -> the Next.js frontend
# Because the browser only ever talks to one origin (http://localhost), there is
# no cross-origin request and therefore no CORS to worry about.

events {}

http {
  upstream frontend_upstream {
    server frontend:3000;
  }
  upstream api_upstream {
    server api:8000;
  }

  server {
    listen 80;
    server_name _;

    # API traffic -> FastAPI. proxy_pass without a path preserves the full URI.
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> the Next.js app.
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
