# nginx as the single front door. Everything enters on port 80:
#   /api/...  -> the FastAPI backend (path preserved, so /api/v1/... still works)
#   /...      -> the Next.js frontend
# Because the browser only ever talks to one origin (http://localhost), there is
# no cross-origin request and therefore no CORS to worry about.

events {}

http {
  # Use Docker's embedded DNS (127.0.0.11) and put the upstream hostnames in
  # variables. This makes nginx resolve "frontend"/"api" lazily, at request time,
  # instead of once at startup. Without this, a cold `docker compose up` can fail
  # with "host not found in upstream" if nginx boots before the frontend is ready.
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 80;
    server_name _;

    # API traffic -> FastAPI. The variable forces request-time DNS resolution.
    location /api/ {
      set $api_target http://api:8000;
      proxy_pass $api_target;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> the Next.js app.
    location / {
      set $frontend_target http://frontend:3000;
      proxy_pass $frontend_target;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
